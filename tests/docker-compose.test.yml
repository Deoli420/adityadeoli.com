# ── SentinelAI — E2E Test Infrastructure ─────────────────────────────────
#
# Usage:
#   cd tests
#   docker compose -f docker-compose.test.yml up -d --build
#   python seed_data.py
#   pytest
#   docker compose -f docker-compose.test.yml down -v
# ─────────────────────────────────────────────────────────────────────────

services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test-net

  mock-server:
    build:
      context: ./mock_server
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health')"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - test-net

  api-test:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db-test
      DB_PORT: "5432"
      DB_USER: sentinel
      DB_PASSWORD: sentinel
      DB_NAME: sentinel_test
      SCHEDULER_ENABLED: "false"
      AI_ENABLED: "false"
      WEBHOOK_ENABLED: "false"
      FRONTEND_ORIGIN: "http://localhost:3000"
      SECRET_KEY: "test-secret-key-e2e-only"
      RATE_LIMIT_ENABLED: "false"
      SSRF_ALLOWLIST_HOSTS: "mock-server"
      BCRYPT_ROUNDS: "4"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    depends_on:
      db-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
